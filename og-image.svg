<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="84" cy="-13" r="79" fill="#0a1628" opacity="0.13"/>
    <circle cx="846" cy="548" r="55" fill="#0a1628" opacity="0.18"/>
    <circle cx="174" cy="205" r="50" fill="#0a1628" opacity="0.18"/>
    <circle cx="714" cy="-96" r="89" fill="#0a1628" opacity="0.20"/>
    <circle cx="1109" cy="521" r="52" fill="#0a1628" opacity="0.08"/>
    <circle cx="712" cy="505" r="28" fill="#0a1628" opacity="0.08"/>
    <rect x="641" y="561" width="20" height="41" rx="8" fill="#0d2137" opacity="0.11" transform="rotate(42, 352, 165)"/>
    <rect x="380" y="322" width="26" height="67" rx="8" fill="#0d2137" opacity="0.09" transform="rotate(1, 1288, 690)"/>
    <rect x="1103" y="531" width="84" height="80" rx="8" fill="#0d2137" opacity="0.11" transform="rotate(2, 787, 446)"/>
    <rect x="-98" y="-70" width="55" height="23" rx="8" fill="#0d2137" opacity="0.13" transform="rotate(6, 409, 484)"/>
    <rect x="-10" y="160" width="61" height="82" rx="8" fill="#0d2137" opacity="0.10" transform="rotate(29, 188, 267)"/>
    <rect x="1018" y="168" width="52" height="47" rx="8" fill="#0d2137" opacity="0.04" transform="rotate(3, 351, 294)"/>
    <rect x="866" y="265" width="80" height="67" rx="8" fill="#0d2137" opacity="0.03" transform="rotate(25, 243, 403)"/>
    <rect x="304" y="475" width="29" height="69" rx="8" fill="#0d2137" opacity="0.06" transform="rotate(27, 912, 88)"/>
    <polygon points="633,424 728,614 538,614" fill="#0a1628" opacity="0.07"/>
    <polygon points="1086,-171 1176,9 996,9" fill="#0a1628" opacity="0.11"/>
    <polygon points="-26,295 21,389 -73,389" fill="#0a1628" opacity="0.04"/>
    <polygon points="84,182 108,230 60,230" fill="#0a1628" opacity="0.10"/>

  <!-- Wave at bottom -->
  <path d="M0,532 C360,581 840,483 1200,532 L1200,630 L0,630Z" fill="#0a1628" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    Aoyama salon 안내
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    Aoyama — 정보
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#00bcd4" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#00bcd4" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    Aoyama Aoyama salon 안내 — 정보
  </text>
</svg>